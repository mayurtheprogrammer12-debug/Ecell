{% extends "base.html" %}
{% block title %}Login | Ennovate'X-26{% endblock %}
{% block content %}
<div class="relative min-h-screen flex flex-col items-center justify-center pt-48 pb-32 px-4 text-center">
    <div class="container mx-auto max-w-md">
        <div class="mb-12 space-y-4 reveal-content">
            <h4 class="text-[11px] font-black uppercase tracking-[0.8em] text-cyan-400/40">Access Core</h4>
            <h2 class="text-6xl font-display font-black text-foreground italic uppercase tracking-tighter">Auth</h2>
        </div>

        <form method="POST"
            class="space-y-10 text-left premium-glass p-16 md:p-20 rounded-[4rem] relative overflow-hidden group reveal-content">
            <div
                class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-cyan-400/30 to-transparent">
            </div>
            {% csrf_token %}

            {% if error %}
            <div
                class="bg-red-500/10 border border-red-500/20 text-red-500 text-[10px] font-bold uppercase tracking-widest p-4 rounded-xl mb-6">
                {{ error }}
            </div>
            {% endif %}

            <div class="space-y-4">
                <label
                    class="block text-[10px] font-black text-foreground/30 uppercase tracking-[0.4em] ml-2">Email</label>
                <input type="email" name="email" placeholder="nexus@example.com" required
                    class="w-full bg-foreground/5 border border-foreground/10 rounded-2xl px-6 py-4 text-foreground outline-none focus:border-cyan-400 transition-all">
            </div>

            <div class="space-y-4">
                <label
                    class="block text-[10px] font-black text-foreground/30 uppercase tracking-[0.4em] ml-2">Password</label>
                <input type="password" name="password" placeholder="••••••••" required
                    class="w-full bg-foreground/5 border border-foreground/10 rounded-2xl px-6 py-4 text-foreground outline-none focus:border-cyan-400 transition-all">
            </div>

            <button type="submit"
                class="btn-premium w-full !bg-gradient-to-r from-cyan-400 to-violet-600 !text-foreground !py-6 !text-[12px] !tracking-[0.4em] shadow-[0_20px_50px_rgba(59,130,246,0.2)]">
                Authenticate
            </button>

            <p class="text-[10px] text-foreground/20 text-center font-bold tracking-widest uppercase">
                First time? <a href="{% url 'register_choice' %}"
                    class="text-cyan-400 hover:text-violet-400 transition-colors">Register Now</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
