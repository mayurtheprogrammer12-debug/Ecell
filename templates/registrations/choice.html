{% extends "base.html" %}

{% block title %}Acquisition Terminal | Ennovate'X-26{% endblock %}

{% block content %}
<div class="relative min-h-screen pt-48 pb-32 px-4 overflow-hidden flex flex-col items-center">
    <!-- Header Space -->
    <div class="container mx-auto max-w-7xl text-center mb-16 reveal-content">
        <div class="flex items-center justify-center space-x-4 mb-8">
            <div class="h-px w-12 bg-cyan-400/20"></div>
            <span class="text-[12px] font-black uppercase tracking-[0.8em] text-cyan-400/40">Secure Identity</span>
            <div class="h-px w-12 bg-cyan-400/20"></div>
        </div>
        <h1 class="text-6xl md:text-8xl font-display font-black tracking-tighter uppercase italic text-foreground mb-6">
            CHOOSE <span class="text-gradient-cyan">SECTOR</span>
        </h1>
    </div>

    <!-- Triple Toggle Selector (Matching User Reference) -->
    <div
        class="relative w-full max-w-md p-1.5 bg-foreground/[0.03] border border-foreground/10 rounded-full mb-20 reveal-content">
        <!-- Sliding Background Glow -->
        <div id="role-selector-bg"
            class="absolute top-1.5 bottom-1.5 left-1.5 w-[32.5%] bg-gradient-to-r from-cyan-400 to-violet-600 rounded-full transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] shadow-[0_0_20px_rgba(6,182,212,0.3)]">
        </div>

        <div class="relative flex z-10 text-center">
            <button onclick="setRole('student', 0)" id="btn-student"
                class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.4em] text-foreground transition-all duration-300">Student</button>
            <button onclick="setRole('visitor', 33.33)" id="btn-visitor"
                class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.4em] text-foreground/30 transition-all duration-300">Visitor</button>
            <button onclick="setRole('exhibitor', 66.66)" id="btn-exhibitor"
                class="flex-1 py-4 text-[10px] font-black uppercase tracking-[0.4em] text-foreground/30 transition-all duration-300">Exhibitor</button>
        </div>
    </div>

    <!-- Main Dynamic Flip Card -->
    <div class="role-card-container w-full max-w-xl reveal-content">
        <div id="master-card-inner" class="role-card-inner">
            <!-- Universal Card Face -->
            <div
                class="role-card-face premium-glass p-16 flex flex-col items-center justify-between text-center overflow-hidden">
                <!-- Dynamic Glow Circle -->
                <div id="dynamic-glow"
                    class="absolute top-0 right-0 w-48 h-48 bg-cyan-400/10 rounded-full blur-[80px] transition-colors duration-700">
                </div>

                <div class="space-y-12 z-10 w-full">
                    <div id="role-icon-box"
                        class="w-24 h-24 rounded-3xl border border-foreground/10 flex items-center justify-center mx-auto bg-foreground/[0.02] shadow-inner transition-colors duration-700">
                        <!-- Student Icon (Initial) -->
                        <svg id="role-svg" class="w-10 h-10 text-cyan-400 transition-colors duration-700" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z">
                            </path>
                        </svg>
                    </div>

                    <div class="space-y-4">
                        <h3 id="role-title"
                            class="text-4xl font-display font-black italic uppercase text-foreground tracking-tight">Student
                        </h3>
                        <p id="role-desc"
                            class="text-foreground/40 text-sm font-medium uppercase tracking-[0.2em] leading-relaxed max-w-xs mx-auto">
                            Submit your credentials for high-stakes innovation sprints and pit your vision against
                            global creators.
                        </p>
                    </div>

                    <div class="w-full h-px bg-foreground/5 relative">
                        <div id="role-line-glow" class="absolute inset-0 bg-cyan-400/30 blur-sm"></div>
                    </div>

                    <a id="role-link" href="{% url 'register_participant' %}?role=student"
                        class="btn-premium w-full !py-6 !text-[12px] !tracking-[0.4em] !bg-cyan-400 !text-background shadow-[0_20px_50px_rgba(6,182,212,0.2)] transition-all duration-700">Initialize
                        Entry</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .role-card-container {
        perspective: 2000px;
        height: 600px;
    }

    .role-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-style: preserve-3d;
    }

    .role-card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 4rem !important;
        border-width: 2px;
        border-color: rgba(255, 255, 255, 0.05);
    }

    .flipping {
        transform: rotateY(360deg);
    }

    /* Animation */
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(60px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .reveal-content {
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>

<script>
    const data = {
        student: {
            title: "Student",
            desc: "Submit your credentials for high-stakes innovation sprints and pit your vision against global creators.",
            color: "#06b6d4", // cyan-400
            glow: "rgba(6,182,212,0.1)",
            link: "{% url 'register_participant' %}?role=student",
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path>',
            shadow: "0_20px_50px_rgba(6,182,212,0.2)"
        },
        visitor: {
            title: "Visitor",
            desc: "Network with institutional giants and experience the frontier of technical achievement across all zones.",
            color: "#8b5cf6", // violet-600
            glow: "rgba(139,92,246,0.1)",
            link: "{% url 'register_participant' %}?role=visitor",
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>',
            shadow: "0_20px_50px_rgba(139,92,246,0.2)"
        },
        exhibitor: {
            title: "Exhibitor",
            desc: "Position your venture for global exposure. Gain direct access to high-conviction institutional partners.",
            color: "#ffffff",
            glow: "rgba(255,255,255,0.05)",
            link: "{% url 'register_exhibitor' %}",
            svg: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>',
            shadow: "0_20px_50px_rgba(255,255,255,0.1)"
        }
    };

    let currentRole = 'student';

    function setRole(role, offset) {
        if (role === currentRole) return;
        currentRole = role;

        const bg = document.getElementById('role-selector-bg');
        const cardInner = document.getElementById('master-card-inner');

        // 1. Update Selector UI
        bg.style.left = `calc(${offset}% + 6px)`;
        ['student', 'visitor', 'exhibitor'].forEach(r => {
            const btn = document.getElementById(`btn-${r}`);
            btn.style.color = (r === role) ? '#fff' : 'rgba(255,255,255,0.3)';
        });

        // 2. Trigger Flip Animation
        cardInner.style.transform = (cardInner.style.transform === 'rotateY(360deg)') ? 'rotateY(0deg)' : 'rotateY(360deg)';

        // 3. Update Content midway through flip (approx 400ms)
        setTimeout(() => {
            const roleData = data[role];
            document.getElementById('role-title').innerText = roleData.title;
            document.getElementById('role-desc').innerText = roleData.desc;
            document.getElementById('role-svg').innerHTML = roleData.svg;
            document.getElementById('role-svg').style.color = roleData.color;
            document.getElementById('role-icon-box').style.borderColor = `${roleData.color}20`;
            document.getElementById('dynamic-glow').style.backgroundColor = roleData.glow;

            const link = document.getElementById('role-link');
            link.href = roleData.link;
            link.style.backgroundColor = roleData.color;
            link.style.color = role === 'visitor' ? '#fff' : '#000';
            link.className = `btn-premium w-full !py-6 !text-[12px] !tracking-[0.4em] shadow-[${roleData.shadow}] transition-all duration-700`;

            document.getElementById('role-line-glow').style.backgroundColor = `${roleData.color}40`;
        }, 300);
    }
</script>
{% endblock %}
