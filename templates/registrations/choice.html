{% extends "base.html" %}

{% block title %}Acquisition | Innovation Summit{% endblock %}

{% block content %}
<div class="relative min-h-screen flex flex-col items-center justify-center pt-32 pb-20 px-4">
    <div class="container mx-auto max-w-7xl">
        <div class="text-center mb-24 reveal-content">
            <h5 class="text-[10px] font-bold uppercase tracking-[0.6em] text-white/40 mb-6">Identification</h5>
            <h1 class="text-5xl md:text-7xl font-display font-black tracking-tighter uppercase italic leading-none">
                Select Your <span
                    class="font-serif font-normal lowercase italic text-white/60 tracking-normal">Status</span>
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 max-w-6xl mx-auto">
            <!-- Student -->
            <a href="{% url 'register_participant' %}?role=student" class="role-card opacity-0 group">
                <div class="luxury-card p-12 rounded-[2.5rem] text-center flex flex-col items-center">
                    <div
                        class="w-20 h-20 rounded-full border border-white/10 flex items-center justify-center mb-10 group-hover:border-white/40 transition-all duration-700">
                        <svg class="w-8 h-8 opacity-40 group-hover:opacity-100 transition-opacity" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-4">Student</h3>
                    <p class="text-white/30 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">Creative Participant
                    </p>
                    <div class="w-8 h-px bg-white/10 mb-10"></div>
                    <span
                        class="text-[10px] font-black uppercase tracking-[0.4em] group-hover:tracking-[0.6em] transition-all">Proceed</span>
                </div>
            </a>

            <!-- Visitor -->
            <a href="{% url 'register_participant' %}?role=visitor" class="role-card opacity-0 group"
                style="animation-delay: 0.2s;">
                <div class="luxury-card p-12 rounded-[2.5rem] text-center flex flex-col items-center">
                    <div
                        class="w-20 h-20 rounded-full border border-white/10 flex items-center justify-center mb-10 group-hover:border-white/40 transition-all duration-700">
                        <svg class="w-8 h-8 opacity-40 group-hover:opacity-100 transition-opacity" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-4">Visitor</h3>
                    <p class="text-white/30 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">General Admission
                    </p>
                    <div class="w-8 h-px bg-white/10 mb-10"></div>
                    <span
                        class="text-[10px] font-black uppercase tracking-[0.4em] group-hover:tracking-[0.6em] transition-all">Proceed</span>
                </div>
            </a>

            <!-- Exhibitor -->
            <a href="{% url 'register_exhibitor' %}" class="role-card opacity-0 group" style="animation-delay: 0.4s;">
                <div class="luxury-card p-12 rounded-[2.5rem] text-center flex flex-col items-center">
                    <div
                        class="w-20 h-20 rounded-full border border-white/10 flex items-center justify-center mb-10 group-hover:border-white/40 transition-all duration-700">
                        <svg class="w-8 h-8 opacity-40 group-hover:opacity-100 transition-opacity" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-black italic uppercase tracking-tighter mb-4">Exhibitor</h3>
                    <p class="text-white/30 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">Showcase Partner</p>
                    <div class="w-8 h-px bg-white/10 mb-10"></div>
                    <span
                        class="text-[10px] font-black uppercase tracking-[0.4em] group-hover:tracking-[0.6em] transition-all">Proceed</span>
                </div>
            </a>
        </div>
    </div>
</div>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .reveal-content {
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .role-card {
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>
{% endblock %}
