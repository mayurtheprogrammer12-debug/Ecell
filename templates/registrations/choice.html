{% extends "base.html" %}

{% block title %}Selection | Nexus Registry{% endblock %}

{% block content %}
<div class="relative min-h-screen flex flex-col items-center justify-center pt-40 pb-20 px-4">
    <div class="container mx-auto max-w-7xl">
        <div class="text-center mb-32 reveal-content">
            <h5 class="text-[9px] font-black uppercase tracking-[0.8em] text-white/20 mb-8">Access Protocols</h5>
            <h1
                class="text-6xl md:text-8xl font-display font-black tracking-tighter uppercase italic leading-[0.85] text-white mb-10">
                CHOOSE YOUR<br><span class="text-champagne">TRAJECTORY</span>
            </h1>
            <div class="w-16 h-[1px] bg-champagne mx-auto"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 max-w-6xl mx-auto">
            <!-- Student -->
            <a href="{% url 'register_participant' %}?role=student" class="role-card opacity-0 group">
                <div
                    class="premium-glass p-16 rounded-[3rem] text-center flex flex-col items-center transition-all duration-700 hover:border-champagne/40 hover:bg-champagne/[0.01]">
                    <div
                        class="w-20 h-20 rounded-full border border-white/10 flex items-center justify-center mb-12 group-hover:border-champagne group-hover:shadow-[0_0_30px_rgba(197,163,104,0.1)] transition-all duration-700">
                        <svg class="w-8 h-8 opacity-20 group-hover:opacity-100 group-hover:text-champagne transition-all"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-3xl font-display font-black italic uppercase tracking-tighter mb-6 text-white">
                        Student</h3>
                    <p class="text-white/20 text-[9px] font-black uppercase tracking-[0.4em] mb-12">Innovation Arena</p>
                    <div class="w-10 h-px bg-white/5 mb-12 group-hover:bg-champagne/40 transition-colors"></div>
                    <span
                        class="text-[9px] font-black uppercase tracking-[0.5em] text-white/40 group-hover:text-champagne group-hover:tracking-[0.7em] transition-all">Synchronize</span>
                </div>
            </a>

            <!-- Visitor -->
            <a href="{% url 'register_participant' %}?role=visitor" class="role-card opacity-0 group"
                style="animation-delay: 0.2s;">
                <div
                    class="premium-glass p-16 rounded-[3rem] text-center flex flex-col items-center transition-all duration-700 hover:border-champagne/40 hover:bg-champagne/[0.01]">
                    <div
                        class="w-20 h-20 rounded-full border border-white/10 flex items-center justify-center mb-12 group-hover:border-champagne group-hover:shadow-[0_0_30px_rgba(197,163,104,0.1)] transition-all duration-700">
                        <svg class="w-8 h-8 opacity-20 group-hover:opacity-100 group-hover:text-champagne transition-all"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-3xl font-display font-black italic uppercase tracking-tighter mb-6 text-white">
                        Visitor</h3>
                    <p class="text-white/20 text-[9px] font-black uppercase tracking-[0.4em] mb-12">Network Observer</p>
                    <div class="w-10 h-px bg-white/5 mb-12 group-hover:bg-champagne/40 transition-colors"></div>
                    <span
                        class="text-[9px] font-black uppercase tracking-[0.5em] text-white/40 group-hover:text-champagne group-hover:tracking-[0.7em] transition-all">Synchronize</span>
                </div>
            </a>

            <!-- Exhibitor -->
            <a href="{% url 'register_exhibitor' %}" class="role-card opacity-0 group" style="animation-delay: 0.4s;">
                <div
                    class="premium-glass p-16 rounded-[3rem] text-center flex flex-col items-center transition-all duration-700 hover:border-champagne/40 hover:bg-champagne/[0.01]">
                    <div
                        class="w-20 h-20 rounded-full border border-white/10 flex items-center justify-center mb-12 group-hover:border-champagne group-hover:shadow-[0_0_30px_rgba(197,163,104,0.1)] transition-all duration-700">
                        <svg class="w-8 h-8 opacity-20 group-hover:opacity-100 group-hover:text-champagne transition-all"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-3xl font-display font-black italic uppercase tracking-tighter mb-6 text-white">
                        Exhibitor</h3>
                    <p class="text-white/20 text-[9px] font-black uppercase tracking-[0.4em] mb-12">Showcase Venture</p>
                    <div class="w-10 h-px bg-white/5 mb-12 group-hover:bg-champagne/40 transition-colors"></div>
                    <span
                        class="text-[9px] font-black uppercase tracking-[0.5em] text-white/40 group-hover:text-champagne group-hover:tracking-[0.7em] transition-all">Synchronize</span>
                </div>
            </a>
        </div>
    </div>
</div>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(60px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .reveal-content {
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .role-card {
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
</style>
{% endblock %}
