{% extends "base.html" %}

{% block title %}Checkout | Innovation Summit{% endblock %}

{% block content %}
<div class="relative min-h-screen flex flex-col items-center justify-center pt-40 pb-20 px-4 overflow-hidden">
    <div class="container mx-auto max-w-xl">
        <div class="reveal-content">
            <div class="luxury-card p-12 md:p-16 rounded-[2.5rem] relative overflow-hidden">
                <!-- Subtle internal lighting -->
                <div
                    class="absolute top-0 right-0 w-64 h-64 bg-white/[0.02] rounded-full blur-3xl -translate-y-1/2 translate-x-1/2">
                </div>

                <div class="text-center mb-16 relative z-10">
                    <h5 class="text-[10px] font-bold uppercase tracking-[0.6em] text-white/30 mb-8">Asset Acquisition
                    </h5>
                    <h2 class="text-4xl font-display font-black tracking-tighter uppercase italic mb-4">
                        Complete<br>Payment</h2>
                    <div class="w-8 h-px bg-white/10 mx-auto my-6"></div>
                    <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-white/40">{{ registration.name }}
                    </p>
                </div>

                <!-- Price Engine -->
                <div class="text-center mb-16 relative z-10">
                    <p class="text-[9px] font-bold uppercase tracking-[0.4em] text-white/20 mb-4">Entry Fee</p>
                    <div class="text-7xl font-display font-black italic tracking-tighter">₹{{ amount }}</div>
                    <div
                        class="mt-6 inline-block px-4 py-1.5 border border-white/5 rounded-full text-[9px] font-black tracking-widest uppercase text-white/30">
                        REF: {{ reference_id }}
                    </div>
                </div>

                <div class="space-y-16 relative z-10">
                    <!-- QR Display -->
                    <div class="flex flex-col items-center">
                        <div
                            class="p-4 bg-white rounded-3xl shadow-2xl transition-transform hover:scale-105 duration-700">
                            <img src="data:image/png;base64,{{ qr_base64 }}" alt="UPI QR"
                                class="w-48 h-48 opacity-90 rounded-2xl">
                        </div>

                        <div class="mt-12 w-full">
                            <button onclick="copyToClipboard('{{ upi_id }}')"
                                class="w-full luxury-glass p-5 rounded-2xl border-white/10 flex items-center justify-between group">
                                <div class="flex flex-col items-start ml-2">
                                    <span
                                        class="text-[8px] font-bold text-white/30 uppercase tracking-[0.3em] mb-1">Network
                                        Identity</span>
                                    <span
                                        class="text-sm font-black tracking-tight text-white/80 group-hover:text-white transition-colors">{{
                                        upi_id }}</span>
                                </div>
                                <div
                                    class="p-3 border border-white/10 rounded-xl group-hover:bg-white group-hover:text-black transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3">
                                        </path>
                                    </svg>
                                </div>
                            </button>
                        </div>
                    </div>

                    <div class="pt-4">
                        <a href="{{ upi_url }}" class="btn-classy w-full text-center block">
                            Launch UPI App
                        </a>
                    </div>

                    <div class="relative py-6 flex items-center">
                        <div class="flex-grow h-px bg-white/5"></div>
                        <span class="px-6 text-[8px] font-bold text-white/20 uppercase tracking-[0.4em]">Verification
                            Required</span>
                        <div class="flex-grow h-px bg-white/5"></div>
                    </div>

                    <!-- Submission Flow -->
                    <form action="{% url 'payment_verify' %}" method="POST" enctype="multipart/form-data"
                        class="space-y-10">
                        {% csrf_token %}
                        <input type="hidden" name="reg_id" value="{{ registration.id }}">

                        <div class="space-y-4">
                            <label class="block text-[10px] font-bold text-white/40 uppercase tracking-[0.3em] ml-2">UTR
                                / Transaction ID</label>
                            <input type="text" name="transaction_id" required placeholder="DIGIT SEQUENCE"
                                class="w-full bg-transparent border-b border-white/10 text-white p-3 outline-none focus:border-white transition-colors placeholder:text-white/5 text-[10px] tracking-[0.5em] font-black uppercase">
                        </div>

                        <div class="space-y-4">
                            <label
                                class="block text-[10px] font-bold text-white/40 uppercase tracking-[0.3em] ml-2">Digital
                                Receipt</label>
                            <input type="file" name="screenshot" accept="image/*" required
                                class="w-full text-white/40 p-4 border border-white/5 rounded-2xl cursor-pointer file:mr-6 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-[9px] file:font-black file:uppercase file:bg-white file:text-black transition-all">
                        </div>

                        <button type="submit"
                            class="w-full py-5 border border-white/10 text-white/60 hover:text-white font-black text-[10px] uppercase tracking-[0.4em] rounded-2xl transition-all hover:bg-white/5 active:scale-95">
                            Verify Transaction
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(function () {
            console.log('Nexus Identity Copied');
        });
    }
</script>

<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(50px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .reveal-content {
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    input[type="file"]::-webkit-file-upload-button {
        cursor: pointer;
    }
</style>
{% endblock %}
