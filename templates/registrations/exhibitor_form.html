{% extends "base.html" %}
{% block title %}Acquisition | Ennovate'X-26{% endblock %}
{% block content %}
<div class="relative min-h-screen flex flex-col items-center justify-center pt-48 pb-32 px-4">
    <div class="container mx-auto max-w-2xl text-center">
        <h2 class="text-5xl font-display font-black text-white mb-12 italic uppercase text-center">Exhibitor
            Registration</h2>
        <form method="POST" class="space-y-12 text-left premium-glass p-20 rounded-[4rem]">
            {% csrf_token %}
            {% for field in form %}
            <div class="space-y-4">
                <label class="block text-sm font-black text-white uppercase tracking-widest text-left">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <p class="text-xs text-azure font-bold italic">{{ field.help_text }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn-premium w-full !bg-azure !text-white">Submit Proposal</button>
        </form>
    </div>
</div>
<style>
    input,
    textarea {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        padding: 1rem;
        color: #fff;
        outline: none;
        transition: 0.3s;
    }

    input:focus,
    textarea:focus {
        border-bottom-color: #3b82f6;
        background: rgba(59, 130, 246, 0.05);
    }
</style>
{% endblock %}
