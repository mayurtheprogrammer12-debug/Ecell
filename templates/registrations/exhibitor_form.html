{% extends "base.html" %}
{% block title %}Acquisition | Ennovate'X-26{% endblock %}
{% block content %}
<div class="relative min-h-screen flex flex-col items-center justify-center pt-48 pb-32 px-4 text-center">
    <div class="container mx-auto max-w-2xl">
        <div class="mb-12 space-y-4 reveal-content">
            <h4 class="text-[11px] font-black uppercase tracking-[0.8em] text-cyan-400/40">Venture Allocation</h4>
            <h2 class="text-6xl font-display font-black text-white italic uppercase tracking-tighter leading-tight">
                Exhibitor Hub</h2>
        </div>

        <form method="POST"
            class="space-y-10 text-left premium-glass p-16 md:p-24 rounded-[4rem] relative overflow-hidden group reveal-content">
            <div
                class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-cyan-400/30 to-transparent">
            </div>
            {% csrf_token %}
            {% for field in form %}
            <div class="space-y-4">
                <label class="block text-[10px] font-black text-white/30 uppercase tracking-[0.4em] ml-2">{{  field.label}}</label>
                {{ field }}
                {% if field.help_text %}
                <p class="text-[10px] text-cyan-400/60 font-bold italic tracking-wider ml-2">{{ field.help_text }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit"
                class="btn-premium w-full !bg-gradient-to-r from-cyan-400 to-violet-600 !text-white !py-6 !text-[12px] !tracking-[0.4em] shadow-[0_20px_50px_rgba(6,182,212,0.2)]">Request
                Access</button>
        </form>
    </div>
</div>
<style>
    input,
    textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 1.5rem;
        padding: 1.25rem 1.5rem;
        color: #fff;
        outline: none;
        transition: 0.4s;
        font-size: 0.9rem;
    }

    input:focus,
    textarea:focus {
        border-color: #06b6d4;
        background: rgba(6, 182, 212, 0.03);
        box-shadow: 0 0 30px rgba(6, 182, 212, 0.1);
    }
</style>
{% endblock %}
