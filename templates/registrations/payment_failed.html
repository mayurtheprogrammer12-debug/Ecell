{% extends "base.html" %}

{% block title %}Payment Failed | E-Cell{% endblock %}

{% block content %}
<div class="max-w-md mx-auto w-full bg-white p-10 rounded-2xl shadow-xl mt-16 text-center border-t-8 border-red-500">
    <div class="mb-6 flex justify-center">
        <svg class="w-20 h-20 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
            </path>
        </svg>
    </div>
    <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Payment Failed!</h2>
    <p class="text-lg text-gray-600 mb-8">Oops, {{ registration.name }}. Something went wrong with your transaction.</p>

    <div class="bg-red-50 p-4 rounded-lg text-left mb-8 space-y-2 text-sm text-gray-700">
        <p>Please try again to secure your spot.</p>
    </div>

    <a href="{% url 'register_participant' %}"
        class="inline-block bg-primary hover:bg-blue-800 text-white font-bold py-3 px-8 rounded-full shadow-md transition transform hover:-translate-y-1">
        Try Again
    </a>
</div>
{% endblock %}
