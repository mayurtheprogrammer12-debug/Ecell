<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Cell Event Registration{% endblock %}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E40AF',
                        secondary: '#F59E0B',
                        dark: '#111827',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">
    <nav class="bg-dark text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'landing_page' %}" class="text-2xl font-bold tracking-wider">E-CELL</a>
            <div class="space-x-4">
                <a href="{% url 'landing_page' %}" class="hover:text-secondary transition">Home</a>
                <a href="{% url 'register_participant' %}" class="hover:text-secondary transition">Participant</a>
                <a href="{% url 'register_exhibitor' %}" class="hover:text-secondary transition">Exhibitor</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow container mx-auto p-4 flex flex-col">
        {% block content %}{% endblock %}
    </main>
    <footer class="bg-dark text-white text-center p-4 mt-auto">
        <p>&copy; 2026 PCCOE Entrepreneurship Cell. All Rights Reserved.</p>
    </footer>
    {% block scripts %}{% endblock %}
</body>

</html>
